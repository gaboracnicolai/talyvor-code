name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - run: cd extension && npm install
      - run: cd extension && npm run compile
      - run: cd extension && npx tsc --noEmit
      - run: cd extension && npm test

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          # The Go module lives at agent/go.mod, not the repo root, so setup-go's
          # cache logged "Restore cache failed: go.mod not found". Point it at the
          # real dependency file so the module cache populates.
          cache-dependency-path: agent/go.sum
      - name: gofmt
        run: |
          cd agent
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - run: cd agent && go vet ./...
      - run: cd agent && go test -race -count=1 ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan for secrets
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml

  jetbrains:
    runs-on: ubuntu-latest
    # Honest, BLOCKING gate: it runs the committed gradle wrapper against the JVM
    # JUnit suite and fails the build on a real test failure (no continue-on-error).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "17"
          distribution: "temurin"
          # Caches ~/.gradle/caches (incl. the IntelliJ Platform SDK, which the
          # gradle-intellij plugin pulls as a Gradle dependency) + ~/.gradle/wrapper,
          # keyed on the gradle build files — so this blocking job isn't a multi-minute
          # SDK download on every merge.
          cache: gradle
      # The wrapper (gradlew + gradle-wrapper.jar) is committed, so ./gradlew
      # self-provisions Gradle 8.7 — no `gradle` preinstall / wrapper-generation step.
      - name: Test + build JetBrains plugin
        run: cd jetbrains && ./gradlew test buildPlugin --no-daemon
